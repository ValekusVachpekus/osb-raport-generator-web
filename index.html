<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Конструктор рапорта ОСБ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --bg2:       #181b24;
      --bg3:       #1e2130;
      --border:    #2a2f45;
      --border-h:  #3d4466;
      --text:      #e2e6f0;
      --text-dim:  #8b92a8;
      --accent:    #5b7cfa;
      --accent-h:  #7b96ff;

      --green:  #2ecc71;
      --blue:   #3b82f6;
      --red:    #ef4444;
      --orange: #f97316;
      --purple: #a855f7;
      --teal:   #14b8a6;
      --gray:   #6b7280;
    }

    html { font-size: 14px; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 18px rgba(91,124,250,.35);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }

    header p {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    /* ── Cards ──────────────────────────────────────────────── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 16px;
      transition: border-color .2s;
    }

    .card:hover { border-color: var(--border-h); }

    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 14px;
    }

    .card-title span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      background: var(--bg3);
      border-radius: 7px;
      font-size: 14px;
    }

    /* ── Form elements ──────────────────────────────────────── */
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 5px;
      margin-top: 12px;
      letter-spacing: .3px;
    }

    label:first-of-type { margin-top: 0; }

    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,124,250,.18);
    }

    input::placeholder, textarea::placeholder { color: #4a5068; }

    textarea { resize: vertical; }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .row > .field { flex: 1; min-width: 140px; }
    .row > .field-sm { flex: 0 0 auto; min-width: 120px; }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border: none;
      border-radius: 9px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: .2px;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s, filter .15s;
    }

    /* ripple */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.12);
      opacity: 0;
      border-radius: inherit;
      transition: opacity .25s;
    }

    .btn:hover::after  { opacity: 1; }
    .btn:active { transform: scale(.96); }
    .btn:hover  { transform: translateY(-1px); }

    .btn-icon {
      font-size: 15px;
      line-height: 1;
    }

    .btn-green  { background: linear-gradient(135deg,#1a9e55,#2ecc71); color:#fff; box-shadow:0 4px 14px rgba(46,204,113,.25); }
    .btn-blue   { background: linear-gradient(135deg,#1d4ed8,#3b82f6); color:#fff; box-shadow:0 4px 14px rgba(59,130,246,.25); }
    .btn-red    { background: linear-gradient(135deg,#b91c1c,#ef4444); color:#fff; box-shadow:0 4px 14px rgba(239,68,68,.25); }
    .btn-orange { background: linear-gradient(135deg,#c2510f,#f97316); color:#fff; box-shadow:0 4px 14px rgba(249,115,22,.3); }
    .btn-purple { background: linear-gradient(135deg,#7e22ce,#a855f7); color:#fff; box-shadow:0 4px 14px rgba(168,85,247,.25); }
    .btn-teal   { background: linear-gradient(135deg,#0d7268,#14b8a6); color:#fff; box-shadow:0 4px 14px rgba(20,184,166,.25); }
    .btn-gray   { background: linear-gradient(135deg,#374151,#6b7280); color:#fff; box-shadow:0 4px 14px rgba(107,114,128,.2); }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Attachments ────────────────────────────────────────── */
    .att-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
      padding: 10px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color .18s;
      animation: slideIn .22s ease;
    }

    .att-row:hover { border-color: var(--border-h); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .att-num {
      font-size: 12px;
      color: var(--text-dim);
      min-width: 20px;
      text-align: right;
      padding-bottom: 7px;
      font-weight: 700;
    }

    .att-name { flex: 0 0 210px; min-width: 120px; }
    .att-url  { flex: 1; min-width: 150px; }

    .att-row label {
      margin: 0 0 4px;
      font-size: 11px;
    }

    .att-field { display: flex; flex-direction: column; gap: 0; }

    /* ── Divider ────────────────────────────────────────────── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin: 14px 0 8px;
    }

    /* ── Output ─────────────────────────────────────────────── */
    #output {
      width: 100%;
      height: 200px;
      font-family: "Cascadia Code", "Fira Code", "Courier New", monospace;
      font-size: 12px;
      background: #0a0d14;
      color: #a8b5d8;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      resize: vertical;
      white-space: pre;
      overflow: auto;
      line-height: 1.6;
      transition: border-color .18s;
    }

    #output:focus { border-color: var(--accent); outline: none; }

    /* ── Actions row ────────────────────────────────────────── */
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding: 16px 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    /* ── Toast ──────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--border-h);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s, transform .22s;
      z-index: 999;
      box-shadow: 0 8px 30px rgba(0,0,0,.5);
      backdrop-filter: blur(8px);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Scrollbar ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #5b6280; }
  </style>
</head>
<body>

<header>
  <div class="logo">📋</div>
  <div>
    <h1>Конструктор рапорта ОСБ</h1>
    <p>Генератор BB-кода для форумных публикаций</p>
  </div>
</header>

<!-- НАСТРОЙКИ -->
<div class="card">
  <div class="card-title"><span>⚙️</span> Настройки</div>

  <label for="position_fio">Должность и ФИО полностью</label>
  <input type="text" id="position_fio" placeholder="оперуполномоченный ОСБ Иванов Иван Иванович" />

  <div class="row" style="margin-top:4px;">
    <div class="field-sm">
      <label for="signature">Подпись</label>
      <input type="text" id="signature" placeholder="Иванов" />
    </div>
    <div class="field">
      <label for="fio_short">ФИО для подписи</label>
      <input type="text" id="fio_short" placeholder="Иванов И. И." />
    </div>
    <div style="padding-bottom:1px;">
      <button class="btn btn-green" onclick="saveConfig()">
        <span class="btn-icon">💾</span> Сохранить
      </button>
    </div>
  </div>
</div>

<!-- ПОЛЯ РАПОРТА -->
<div class="card">
  <div class="card-title"><span>📝</span> Поля рапорта</div>

  <label for="subject">О чём (нарушении устава ОВД, нарушении законодательства)</label>
  <input type="text" id="subject" placeholder="нарушении п. X устава ОВД..." />

  <label for="basis">Основание рапорта (подробно: дата, суть, ссылки на законы)</label>
  <textarea id="basis" rows="6" placeholder="Дата, описание события, ссылки на статьи законов..."></textarea>

  <label for="request">Прошу руководство ГАИ</label>
  <textarea id="request" rows="3" placeholder="провести проверку и привлечь к ответственности..."></textarea>
</div>

<!-- ПРИЛОЖЕНИЯ -->
<div class="card">
  <div class="card-title"><span>📎</span> Приложения</div>

  <label for="usb_url">Перенос доказательств на USB-Flash — URL</label>
  <input type="url" id="usb_url" placeholder="https://..." />

  <div class="section-label">Фото / видео фиксации</div>
  <div id="att-container"></div>

  <div class="btn-row" style="margin-top:10px;">
    <button class="btn btn-blue" onclick="addAttachment()">
      <span class="btn-icon">＋</span> Добавить
    </button>
    <button class="btn btn-red" onclick="removeLastAttachment()">
      <span class="btn-icon">－</span> Удалить последнее
    </button>
  </div>
</div>

<!-- ДЕЙСТВИЯ -->
<div class="actions">
  <button class="btn btn-orange" onclick="generate()">
    <span class="btn-icon">⚡</span> Сгенерировать BB-код
  </button>
  <button class="btn btn-purple" onclick="copyToClipboard()">
    <span class="btn-icon">📋</span> Скопировать в буфер
  </button>
  <button class="btn btn-gray" onclick="clearOutput()">
    <span class="btn-icon">🗑</span> Очистить вывод
  </button>
</div>

<!-- ВЫВОД -->
<div class="card">
  <div class="card-title"><span>📄</span> Готовый BB-код</div>
  <textarea id="output" readonly placeholder="Нажмите «Сгенерировать BB-код»..."></textarea>
</div>

<div id="toast"></div>

<script>
  const STORAGE_KEY = "osb_raport_config";

  const MONTHS_RU = [
    "","января","февраля","марта","апреля","мая","июня",
    "июля","августа","сентября","октября","ноября","декабря"
  ];

  function loadConfig() {
    try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); }
    catch (_) {}
    return {};
  }

  function saveConfig() {
    const cfg = {
      position_fio: document.getElementById("position_fio").value.trim(),
      signature:    document.getElementById("signature").value.trim(),
      fio_short:    document.getElementById("fio_short").value.trim(),
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
    showToast("✅ Настройки сохранены");
  }

  function applyConfig() {
    const cfg = loadConfig();
    if (cfg.position_fio) document.getElementById("position_fio").value = cfg.position_fio;
    if (cfg.signature)    document.getElementById("signature").value    = cfg.signature;
    if (cfg.fio_short)    document.getElementById("fio_short").value    = cfg.fio_short;
  }

  let attCount = 0;

  function addAttachment() {
    attCount++;
    const idx = attCount;
    const container = document.getElementById("att-container");
    const row = document.createElement("div");
    row.className = "att-row";
    row.dataset.idx = idx;
    row.innerHTML = `
      <span class="att-num">${idx}.</span>
      <div class="att-field att-name">
        <label>Название</label>
        <input type="text" class="att-name-input" value="Доказательства №${idx}" />
      </div>
      <div class="att-field att-url">
        <label>URL</label>
        <input type="url" class="att-url-input" placeholder="https://..." />
      </div>
    `;
    container.appendChild(row);
  }

  function removeLastAttachment() {
    const container = document.getElementById("att-container");
    const rows = container.querySelectorAll(".att-row");
    if (!rows.length) return;
    const last = rows[rows.length - 1];
    last.style.animation = "none";
    last.style.transition = "opacity .18s, transform .18s";
    last.style.opacity = "0";
    last.style.transform = "translateY(-6px)";
    setTimeout(() => last.remove(), 180);
  }

  function generate() {
    const positionFio = document.getElementById("position_fio").value.trim() || "[Должность и ФИО не указаны]";
    const signature   = document.getElementById("signature").value.trim()    || "________________";
    const fioShort    = document.getElementById("fio_short").value.trim()    || "[ФИО]";
    const subject     = document.getElementById("subject").value.trim()      || "[суть нарушения не указана]";
    const basis       = document.getElementById("basis").value.trim()        || "[основание не указано]";
    const request     = document.getElementById("request").value.trim()      || "[требования не указаны]";
    const usbUrl      = document.getElementById("usb_url").value.trim();

    const now = new Date();
    const day = String(now.getDate());
    const month = MONTHS_RU[now.getMonth() + 1];
    const yearFull = String(now.getFullYear());

    const attLines = [];
    document.querySelectorAll("#att-container .att-row").forEach(row => {
      const name = row.querySelector(".att-name-input").value.trim();
      const url  = row.querySelector(".att-url-input").value.trim();
      if (name && url)  attLines.push(`[URL=${url}]${name}[/URL]`);
      else if (name)    attLines.push(`${name} — [ссылка не указана]`);
    });

    if (usbUrl) attLines.push(`[URL=${usbUrl}]Перенос доказательств на USB-Flash[/URL]`);
    else        attLines.push("Перенос доказательств на USB-Flash — [ссылка не указана]");

    const attachmentsBb = attLines.join("\n");

    const bb =
`[RIGHT][SIZE=15px][FONT=Times New Roman]Руководству ГАИ по Нижегородской области[/FONT][/SIZE]
[FONT=Times New Roman][SIZE=15px]от ${positionFio}[/SIZE][/FONT]
[/RIGHT]
[HEADING=2][CENTER][FONT=Times New Roman][SIZE=15px][B]РАПОРТ О ДИСЦИПЛИНАРНОМ ПРОСТУПКЕ[/B][/SIZE][/FONT][/CENTER][/HEADING]
[CENTER][FONT=Times New Roman][SIZE=15px]о ${subject}[/SIZE][/FONT]
[/CENTER]
[FONT=Times New Roman][SIZE=15px][B]Основание рапорта: [/B]${basis}[/SIZE][/FONT]
[RIGHT][/RIGHT]
[FONT=Times New Roman][SIZE=15px][FONT=Times New Roman][SIZE=15px][B]Прошу руководство ГАИ: [/B]${request}[/SIZE][/FONT][/SIZE][/FONT]
[RIGHT][/RIGHT]
[FONT=Times New Roman][SIZE=15px][FONT=Times New Roman][SIZE=15px][B]Приложения:[/B]
${attachmentsBb}[/SIZE][/FONT][/SIZE][/FONT]
[RIGHT]
[FONT=Times New Roman][SIZE=15px][FONT=Times New Roman][SIZE=15px]Дата: «${day}[B]» ${month} [/B]${yearFull} г.[/SIZE][/FONT]
[SIZE=15px][FONT=Times New Roman]Подпись: ${signature} / ${fioShort}[/FONT][/SIZE][/SIZE][/FONT]
[/RIGHT]`;

    document.getElementById("output").value = bb;
    showToast("✅ BB-код сгенерирован");
  }

  async function copyToClipboard() {
    const content = document.getElementById("output").value.trim();
    if (!content) { showToast("⚠️ Сначала сгенерируйте BB-код"); return; }
    try {
      await navigator.clipboard.writeText(content);
    } catch (_) {
      document.getElementById("output").select();
      document.execCommand("copy");
    }
    showToast("✅ BB-код скопирован в буфер обмена");
  }

  function clearOutput() {
    document.getElementById("output").value = "";
    showToast("🗑 Вывод очищен");
  }

  let toastTimer = null;
  function showToast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
  }

  applyConfig();
  addAttachment();
</script>
</body>
</html>
